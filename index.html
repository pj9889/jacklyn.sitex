    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background-color: #000;
        }

        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }

        .bg-slide.active {
            opacity: 0.4; /* ব্যাকগ্রাউন্ড উজ্জ্বলতা কমানো হয়েছে */
        }

        .wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
        }

        .top-logo-box {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .top-logo-box img {
            max-width: 100%;
            height: auto;
            max-height: 65px;
            object-fit: contain;
        }

        .card {
            background: rgba(15, 15, 25, 0.3); 
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            padding: 35px 25px;
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
        }

        .text-title {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #f1f5f9;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .btn-shake-cta {
            background: linear-gradient(135deg, #00dbde, #fc00ff);
            color: white;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 20px rgba(0, 219, 222, 0.6);
            animation: lightShake 2s infinite, pulseGlow 1.5s infinite alternate;
            text-transform: uppercase;
        }

        @keyframes lightShake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
            20%, 40%, 60%, 80% { transform: translateX(3px); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(0, 219, 222, 0.6); }
            100% { box-shadow: 0 0 30px rgba(252, 0, 255, 1); }
        }

    </style>
</head>
<body>

            </p>

    <script>
        const slides = document.querySelectorAll('.bg-slide');
        let currentSlideIndex = 0;

        function changeBackground() {
            if(slides.length > 0) {
                slides[currentSlideIndex].classList.remove('active');
                currentSlideIndex = (currentSlideIndex + 1) % slides.length;
                slides[currentSlideIndex].classList.add('active');
            }
        }
